name: PR Check

on:
  pull_request:
    branches: [ main, dev ]
    types: [ opened, synchronize, reopened ]

jobs:
  # 检查 PR 是否符合 Git Flow
  git-flow-check:
    name: Git Flow Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Check base branch
      run: |
        echo "Base branch: ${{ github.base_ref }}"
        echo "Head branch: ${{ github.head_ref }}"
        
        # 禁止直接推送到 main
        if [ "${{ github.base_ref }}" = "main" ] && [ "${{ github.head_ref }}" != "dev" ]; then
          echo "❌ ERROR: Only 'dev' branch can be merged into 'main'"
          echo "Follow Git Flow: feature → dev → main"
          exit 1
        fi
        
        # 禁止 feature 分支推送到远程
        if [[ "${{ github.head_ref }}" == feature/* ]]; then
          echo "❌ ERROR: Feature branches should not be pushed to remote"
          echo "Workflow: develop locally on feature/*, then merge to dev"
          exit 1
        fi
        
        echo "✅ Git Flow check passed"

  # 检查提交信息格式
  commit-message-check:
    name: Commit Message Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Check commit messages
      run: |
        # 获取所有提交信息
        commits=$(git log --format=%s origin/${{ github.base_ref }}..origin/${{ github.head_ref }})
        
        # 定义允许的提交类型
        valid_types="feat|fix|docs|style|refactor|test|chore|ci|perf|build"
        
        echo "Checking commits..."
        echo "$commits"
        
        while IFS= read -r commit; do
          if [[ ! $commit =~ ^($valid_types)(\(.+\))?!?: ]]; then
            echo "❌ Invalid commit message: $commit"
            echo "   Must follow Conventional Commits: type(scope): description"
            echo "   Valid types: $valid_types"
            exit 1
          fi
        done <<< "$commits"
        
        echo "✅ All commit messages valid"

  # 代码审查检查
  code-review-check:
    name: Code Review Check
    runs-on: ubuntu-latest
    needs: [git-flow-check]
    
    steps:
    - name: Check review requirements
      if: github.base_ref == 'main'
      run: |
        echo "⚠️ Reminder: Changes to 'main' require:"
        echo "   - At least 1 approval"
        echo "   - All CI checks passing"
        echo "   - No unresolved conversations"
