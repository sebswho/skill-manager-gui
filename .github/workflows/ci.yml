name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Frontend build and test
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: |
        cd src-ui
        bun install
    
    - name: Build frontend
      run: |
        cd src-ui
        bun run build
    
    - name: Type check
      run: |
        cd src-ui
        npx tsc --noEmit

  # Rust backend build and test
  backend:
    name: Backend Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: src-tauri
    
    - name: Check formatting
      run: |
        cd src-tauri
        cargo fmt -- --check
    
    - name: Run clippy
      run: |
        cd src-tauri
        cargo clippy -- -D warnings
    
    - name: Run tests
      run: |
        cd src-tauri
        cargo test --verbose

  # E2E tests with Playwright
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [frontend]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: |
        cd src-ui
        bun install
    
    - name: Install Playwright
      run: |
        cd src-ui
        bunx playwright install --with-deps chromium
    
    - name: Build frontend
      run: |
        cd src-ui
        bun run build
    
    - name: Serve and test
      run: |
        cd src-ui/dist
        python3 -m http.server 1420 &
        sleep 2
        cd ../..
        bunx playwright test
    
    - name: Upload test results
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: test-results/

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
    
    - name: Run cargo audit
      run: |
        cargo install cargo-audit
        cd src-tauri
        cargo audit
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
